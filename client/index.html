<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>David's Magic RPG</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #0b0c10;
        font-family: 'Outfit', 'Inter', sans-serif;
        color: #ffffff;
      }
      #game-container {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      #ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        box-sizing: border-box;
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .hud-panel {
        background: rgba(25, 25, 35, 0.75);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 15px 25px;
        pointer-events: auto;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      }
      h1 {
        margin: 0 0 5px 0;
        font-size: 1.5rem;
        background: linear-gradient(45deg, #ff4e50, #f9d423);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .health-bar-container {
        width: 200px;
        height: 15px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 5px;
        overflow: hidden;
        margin-top: 5px;
      }
      .health-bar {
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, #ff4b2b, #ff416c);
        transition: width 0.3s ease;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <div id="ui-layer">
      <div class="hud-panel" id="player-hud">
        <h1 id="character-name">Wizard Knight</h1>
        <div>Grimoire: <span id="grimoire-type">Pending Ceremony...</span></div>
        <div class="health-bar-container">
          <div class="health-bar" id="player-health"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
